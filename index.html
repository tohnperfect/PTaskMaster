<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TaskMaster</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e1219;--bg2:#161b27;--bg3:#1e2535;
  --b:rgba(255,255,255,0.08);--b2:rgba(255,255,255,0.14);
  --t:#fff;--m:#9ca3af;--d:#6b7280;
  --a:#6366f1;--al:#818cf8;--ab:rgba(99,102,241,0.15);
  --g:#34d399;--gb:rgba(52,211,153,0.15);
  --r:#ef4444;--rb:rgba(239,68,68,0.12);
  --fd:'DM Serif Display',serif;--fb:'Plus Jakarta Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--fb);background:var(--bg);color:var(--t);min-height:100vh}
#root{max-width:480px;margin:0 auto}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}
.dp{font-family:var(--fd);letter-spacing:-.02em}
input,textarea,select{font-family:var(--fb);background:rgba(255,255,255,0.07);border:1px solid var(--b);border-radius:12px;color:var(--t);outline:none;font-size:14px;width:100%;padding:12px 16px;transition:border-color .2s}
input:focus,textarea:focus,select:focus{border-color:rgba(99,102,241,0.5)}
input[type=range]{padding:0;border:none;background:transparent}
select{appearance:none;color-scheme:dark}
select option{background:#1e2535}
textarea{resize:none}
input[type=datetime-local]{color-scheme:dark}
::placeholder{color:var(--d)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;border-radius:12px;font-family:var(--fb);font-weight:600;transition:opacity .15s,transform .1s;user-select:none}
.btn:active{transform:scale(.97)}
.bp{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;padding:14px 20px;font-size:14px;border-radius:16px;width:100%}
.bg{background:rgba(255,255,255,0.05);color:var(--m);padding:10px;border-radius:12px}
.bg:hover{color:var(--t)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:50;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:var(--bg2);border:1px solid var(--b);border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;padding:18px 18px 40px}
.hdl{width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);margin:0 auto 16px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:999px;font-size:12px;font-weight:500;border:1px solid var(--b);background:rgba(255,255,255,0.06);color:var(--m);cursor:pointer;transition:all .2s}
.ca{background:var(--ab);border-color:var(--a);color:var(--al)}
.cg{background:var(--gb);border-color:var(--g);color:#6ee7b7}
.pb{width:100%;height:6px;border-radius:999px;background:rgba(255,255,255,0.08);overflow:hidden;margin-top:7px}
.pf{height:100%;border-radius:999px;transition:width .7s}

/* Header */
#hdr{position:sticky;top:0;z-index:30;padding:0 14px;background:rgba(14,18,25,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--b)}
.htop{display:flex;align-items:center;justify-content:space-between;padding:11px 0 9px}
.tabs{display:flex;gap:3px;padding:4px;background:rgba(255,255,255,0.05);border-radius:12px;margin-bottom:9px}
.tab{flex:1;padding:7px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;background:transparent;color:var(--d);transition:all .2s}
.tab.on{background:#fff;color:#0e1219}
.tbdg{font-size:11px;padding:2px 6px;border-radius:999px}
.tab.on .tbdg{background:rgba(0,0,0,0.1);color:#374151}
.tab:not(.on) .tbdg{background:rgba(255,255,255,0.1);color:var(--m)}
.fr{display:flex;gap:7px;overflow-x:auto;padding-bottom:9px;scrollbar-width:none}
.fr::-webkit-scrollbar{display:none}
.fp{flex-shrink:0;padding:5px 11px;border-radius:999px;font-size:12px;font-weight:500;border:1px solid var(--b);background:rgba(255,255,255,0.05);color:var(--d);cursor:pointer;transition:all .2s;white-space:nowrap}
.cr{display:flex;gap:7px;padding-bottom:11px}
.cb{flex:1;display:flex;align-items:center;gap:7px;background:rgba(255,255,255,0.05);border-radius:12px;padding:8px 11px}
.cb svg{flex-shrink:0;opacity:.5}
.cb select{background:transparent;border:none;padding:0;font-size:12px;color:var(--m);flex:1}

/* Task cards */
.tc{background:var(--bg3);border:1px solid var(--b);border-radius:20px;padding:13px;margin-bottom:9px}
.tc.od{border-color:rgba(239,68,68,0.4)}
.tc.dn{opacity:.55}
.tt{display:flex;align-items:flex-start;gap:9px}
.cbx{width:24px;height:24px;border-radius:8px;border:2px solid rgba(255,255,255,0.2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:2px}
.cbx.on{background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none}
.tb{flex:1;min-width:0;cursor:pointer}
.mi{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--m)}
.ta{display:flex;gap:3px;flex-shrink:0}
.ta button{padding:6px;border-radius:8px;border:none;cursor:pointer;background:transparent;color:var(--d);transition:color .2s}
.ta button:hover{color:var(--al)}
.ta .dl:hover{color:var(--r)}
.tx{margin-top:11px;padding-top:11px;border-top:1px solid rgba(255,255,255,0.05);font-size:12px;color:var(--m);line-height:1.6;display:none}
.tx.on{display:block}
.gh{display:flex;align-items:center;gap:7px;margin:14px 0 7px}
.gl{font-size:13px;font-weight:700}

/* Form */
.fg{margin-bottom:14px}
.fl{font-size:12px;color:var(--m);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.tg{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.tbtn{padding:11px;border-radius:12px;border:1px solid var(--b);background:rgba(255,255,255,0.05);cursor:pointer;text-align:left;transition:all .2s}
.tbtn .tl{font-size:13px;font-weight:600;color:var(--t)}
.tbtn .ts{font-size:11px;color:var(--m);margin-top:2px}
.cr2{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:7px}
.ar{display:flex;gap:7px;margin-top:7px}
.ar input{flex:1;padding:8px 12px;font-size:12px}
.ab{padding:8px 13px;border-radius:12px;border:none;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap}
.vw{position:relative}
.vw input{padding-left:30px}
.vpx{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:14px;font-weight:700;color:var(--g);pointer-events:none}
.vpv{position:absolute;right:15px;top:50%;transform:translateY(-50%);font-size:12px;font-weight:700;color:var(--g);pointer-events:none}
.prs{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.prb{padding:5px 10px;border-radius:999px;font-size:11px;border:1px solid var(--b);background:rgba(255,255,255,0.05);color:var(--d);cursor:pointer;transition:all .2s}
.prb.on{background:var(--gb);border-color:var(--g);color:#6ee7b7}

/* Analytics */
.at{display:flex;gap:3px;padding:4px;background:rgba(255,255,255,0.05);border-radius:12px;margin-bottom:13px}
.atb{flex:1;padding:6px;border-radius:8px;font-size:12px;font-weight:600;border:none;cursor:pointer;background:transparent;color:var(--d);transition:all .2s}
.atb.on{background:#fff;color:#0e1219}
.sg{display:grid;gap:9px;margin-bottom:12px}
.sg.c3{grid-template-columns:repeat(3,1fr)}
.sg.c2{grid-template-columns:repeat(2,1fr)}
.sb{background:rgba(255,255,255,0.05);border-radius:16px;padding:13px;text-align:center}
.sv{font-size:22px;font-weight:700;font-family:var(--fd)}
.sl{font-size:11px;color:var(--m);margin-top:3px}
.ar2{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:13px;margin-bottom:7px}
.art{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.ct{border:1px solid var(--b);border-radius:16px;overflow:hidden}
.cth{display:grid;grid-template-columns:1fr 1fr 1fr;padding:9px 14px;font-size:11px;font-weight:700;color:var(--d);text-transform:uppercase;letter-spacing:.06em;background:rgba(255,255,255,0.03)}
.ctr{display:grid;grid-template-columns:1fr 1fr 1fr;padding:11px 14px;font-size:13px;border-top:1px solid rgba(255,255,255,0.04);align-items:center}
.ctr:nth-child(odd){background:rgba(255,255,255,0.02)}

/* Login */
#login{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;background:radial-gradient(ellipse at 50% 0%,rgba(99,102,241,0.18) 0%,transparent 65%)}
.logo{width:68px;height:68px;border-radius:22px;margin:0 auto 24px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center}
.gbtn{display:flex;align-items:center;justify-content:center;gap:12px;padding:14px 24px;border-radius:16px;border:1px solid var(--b);background:rgba(255,255,255,0.08);cursor:pointer;font-size:15px;font-weight:600;color:var(--t);width:100%;max-width:300px;margin:24px auto 0;transition:background .2s;font-family:var(--fb)}
.gbtn:hover{background:rgba(255,255,255,0.13)}
.gbtn svg{width:20px;height:20px;flex-shrink:0}

/* Workspace screen */
#wss{min-height:100vh;padding:22px 14px 40px;max-width:480px;margin:0 auto}
.wsh{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.wsc{background:var(--bg3);border:1px solid var(--b);border-radius:20px;padding:15px;cursor:pointer;transition:border-color .2s,background .2s;margin-bottom:9px}
.wsc:hover{border-color:var(--b2);background:#232d42}
.wsc.own{border-left:3px solid var(--al)}
.wsc.shr{border-left:3px solid var(--g)}
.wsc-h{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:5px}
.wsc-n{font-size:15px;font-weight:700}
.wsbdg{font-size:10px;font-weight:700;padding:3px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:.06em}
.wsac{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--b)}
.wsb{flex:1;padding:8px;border-radius:10px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:var(--fb);transition:all .2s}
.nwf{background:var(--bg2);border:1px solid var(--b);border-radius:20px;padding:18px;margin-bottom:14px;display:none}
.nwf.on{display:block}

/* Workspace bar in app */
#wsbar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:rgba(99,102,241,0.08);border-bottom:1px solid rgba(99,102,241,0.2);cursor:pointer;transition:background .2s}
#wsbar:hover{background:rgba(99,102,241,0.14)}

/* Share */
.sur{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--b)}
.sur:last-child{border-bottom:none}

/* Sync / Toast */
#sync{position:fixed;bottom:14px;right:14px;background:rgba(30,37,53,0.95);border:1px solid var(--b);border-radius:999px;padding:6px 14px;font-size:12px;color:var(--m);display:flex;align-items:center;gap:6px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
#sync.on{opacity:1}
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--b);border-radius:12px;padding:10px 18px;font-size:13px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.on{opacity:1}
.spin{animation:spin .8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.av{width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid var(--b);flex-shrink:0}
.avf{width:32px;height:32px;border-radius:50%;background:var(--ab);border:2px solid var(--a);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--al);flex-shrink:0}
</style>
</head>
<body>
<div id="root"></div>
<div id="sync"><span class="spin">⟳</span><span id="smsg">Syncing…</span></div>
<div id="toast"></div>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
// ═══════════════════════════════════════════════════
// CONFIG — only edit CLIENT_ID before deploying
// ═══════════════════════════════════════════════════
const CLIENT_ID = '744722796469-no8r8kgrei3cehrg33ojjiqesania0gt.apps.googleusercontent.com';
// ═══════════════════════════════════════════════════
const SCOPES = 'email profile https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive https://www.googleapis.com/auth/calendar.events';
const TCOLS = ['id','title','description','isBig','isUrgent','priority','value','deadline','assignees','group','done','createdAt','finishedAt','notes'];
const QD = {'big-urgent':{l:'Big & Urgent',c:'#ef4444',bg:'rgba(239,68,68,0.12)',e:'🔥'},'big-noturgent':{l:'Big, Not Urgent',c:'#f59e0b',bg:'rgba(245,158,11,0.12)',e:'⭐'},'small-urgent':{l:'Small & Urgent',c:'#3b82f6',bg:'rgba(59,130,246,0.12)',e:'⚡'},'small-noturgent':{l:'Small, Not Urgent',c:'#6b7280',bg:'rgba(107,114,128,0.1)',e:'📋'}};

const S={user:null,token:null,texp:0,screen:'login',workspaces:[],ws:null,tasks:[],groups:['Research','Teaching','Admin','Startup'],people:[],tab:'active',sort:'created',grp:'none',fq:'all',modal:null,editTask:null,expanded:new Set(),atab:'overview'};
let tcl;

// Utils
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
const fmt=d=>d?new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'}):'—';
const fmtFull=d=>d?new Date(d).toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}):'—';
const fmtM=v=>{const n=Number(v);if(!v&&v!==0||isNaN(n))return null;if(n>=1e6)return`฿${(n/1e6).toFixed(1)}M`;if(n>=1e3)return`฿${(n/1e3).toFixed(0)}K`;return`฿${n.toLocaleString()}`;};
const isOD=d=>d&&new Date(d)<new Date();
const dleft=d=>{if(!d)return null;return Math.ceil((new Date(d)-new Date())/86400000);};
const getQ=t=>(t.isBig&&t.isUrgent)?'big-urgent':t.isBig?'big-noturgent':t.isUrgent?'small-urgent':'small-noturgent';
const pCol=p=>p>=8?'#ef4444':p>=5?'#f59e0b':p>=3?'#3b82f6':'#6b7280';
const bool=v=>v==='TRUE'||v===true||v==='true';
const showSync=m=>{const e=document.getElementById('sync'),t=document.getElementById('smsg');if(m){t.textContent=m;e.classList.add('on');}else e.classList.remove('on');};
const toast=(m,ms=2500)=>{const e=document.getElementById('toast');e.textContent=m;e.classList.add('on');setTimeout(()=>e.classList.remove('on'),ms);};

const I={
  plus:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20"><path d="M12 5v14M5 12h14"/></svg>`,
  check:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" width="14" height="14"><path d="M20 6L9 17l-5-5"/></svg>`,
  trash:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>`,
  edit:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4z"/></svg>`,
  close:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20"><path d="M18 6L6 18M6 6l12 12"/></svg>`,
  sort:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M3 6h18M7 12h10M11 18h2"/></svg>`,
  grp:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg>`,
  chart:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>`,
  gear:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>`,
  cal:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>`,
  tag:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><circle cx="7" cy="7" r="1" fill="currentColor"/></svg>`,
  user:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
  exp:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>`,
  logout:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>`,
  star:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
  money:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><circle cx="12" cy="12" r="10"/><path d="M12 6v2m0 8v2m-3-7h4.5a1.5 1.5 0 010 3H9a1.5 1.5 0 000 3H13"/></svg>`,
  share:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>`,
  back:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>`,

  ref:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>`,

// ── Auth ─────────────────────────────────────────────────────
function initAuth(){
  tcl=google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID,scope:SCOPES,callback:onToken,
    error_callback:e=>{const el=document.getElementById('lerr');if(el){el.style.display='block';el.textContent='Sign-in error: '+(e.message||e.type||'Unknown error');}}});
}
async function onToken(resp){
  if(resp.error){console.error(resp);return;}
  S.token=resp.access_token;S.texp=Date.now()+(parseInt(resp.expires_in)-60)*1000;
  try{const r=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:`Bearer ${S.token}`}});S.user=await r.json();showWorkspaces();}
  catch(e){alert('Login error: '+e.message);}
}
function signIn(){if(!tcl){initAuth();setTimeout(()=>tcl.requestAccessToken({prompt:'select_account'}),200);}else tcl.requestAccessToken({prompt:'select_account'});}
function signOut(){if(S.token)try{google.accounts.oauth2.revoke(S.token,()=>{});}catch{}S.token=null;S.user=null;S.ws=null;S.tasks=[];S.workspaces=[];showLogin();}
async function ensureToken(){if(S.token&&Date.now()<S.texp)return;return new Promise(r=>{tcl.callback=async resp=>{if(!resp.error){S.token=resp.access_token;S.texp=Date.now()+(parseInt(resp.expires_in)-60)*1000;}r();};tcl.requestAccessToken({prompt:''});});}

// ── Drive API ─────────────────────────────────────────────────
async function driveReq(path,opts={}){
  await ensureToken();
  const r=await fetch('https://www.googleapis.com/drive/v3'+path,{headers:{Authorization:`Bearer ${S.token}`,'Content-Type':'application/json'},...opts});
  if(r.status===204)return{};
  const data=await r.json();
  if(!r.ok)throw new Error(data.error?.message||`Drive error ${r.status}`);
  return data;
}

async function listWorkspaces(){
  // Find spreadsheets tagged with our appProperty OR named with [TM] prefix
  const q=`mimeType='application/vnd.google-apps.spreadsheet' and trashed=false and (appProperties has {key='taskmaster' and value='true'} or name contains '[TM]')`;
  const fields='files(id,name,owners,modifiedTime,capabilities,shared)';
  const data=await driveReq(`/files?q=${encodeURIComponent(q)}&fields=${encodeURIComponent(fields)}&pageSize=100`);
  return(data.files||[]).map(f=>({
    id:f.id,name:f.name.replace(/^\[TM\]\s*/,''),
    owner:f.owners?.[0]?.displayName||'Unknown',ownerEmail:f.owners?.[0]?.emailAddress||'',
    isOwner:f.owners?.[0]?.me===true,canEdit:f.capabilities?.canEdit!==false,
    mod:f.modifiedTime,shared:f.shared,
  }));
}

async function createWorkspace(name){
  await ensureToken();
  const r=await fetch('https://sheets.googleapis.com/v4/spreadsheets',{method:'POST',
    headers:{Authorization:`Bearer ${S.token}`,'Content-Type':'application/json'},
    body:JSON.stringify({properties:{title:`[TM] ${name}`},sheets:[{properties:{title:'Tasks'}},{properties:{title:'Config'}}]})});
  if(!r.ok)throw new Error('Failed to create spreadsheet');
  const sheet=await r.json();
  // Tag with appProperty for future listing
  await driveReq(`/files/${sheet.spreadsheetId}`,{method:'PATCH',body:JSON.stringify({appProperties:{taskmaster:'true'}})});
  return sheet.spreadsheetId;
}

async function deleteWorkspace(id){await driveReq(`/files/${id}`,{method:'DELETE'});}

async function getPermissions(id){
  const data=await driveReq(`/files/${id}/permissions?fields=permissions(id,role,type,emailAddress,displayName,photoLink,pendingOwner)`);
  return(data.permissions||[]).filter(p=>p.type==='user');
}
async function addEditor(fid,email){
  const r=await fetch(`https://www.googleapis.com/drive/v3/files/${fid}/permissions?sendNotificationEmail=true`,{method:'POST',
    headers:{Authorization:`Bearer ${S.token}`,'Content-Type':'application/json'},
    body:JSON.stringify({role:'writer',type:'user',emailAddress:email})});
  const data=await r.json();if(!r.ok)throw new Error(data.error?.message||'Failed to share');return data;
}
async function removePermission(fid,pid){await driveReq(`/files/${fid}/permissions/${pid}`,{method:'DELETE'});}

// ── Sheets API ────────────────────────────────────────────────
const SA='https://sheets.googleapis.com/v4/spreadsheets';
async function sGet(range){await ensureToken();const r=await fetch(`${SA}/${S.ws.id}/values/${encodeURIComponent(range)}`,{headers:{Authorization:`Bearer ${S.token}`}});if(!r.ok)throw new Error(`Sheet read ${r.status}`);return r.json();}
async function sClear(sh){await ensureToken();await fetch(`${SA}/${S.ws.id}/values/${encodeURIComponent(sh+'!A1:Z9999')}:clear`,{method:'POST',headers:{Authorization:`Bearer ${S.token}`}});}
async function sWrite(range,vals){await ensureToken();const r=await fetch(`${SA}/${S.ws.id}/values/${encodeURIComponent(range)}?valueInputOption=RAW`,{method:'PUT',headers:{Authorization:`Bearer ${S.token}`,'Content-Type':'application/json'},body:JSON.stringify({values:vals})});if(!r.ok)throw new Error(`Sheet write ${r.status}`);}
async function clearWrite(sh,vals){await sClear(sh);if(vals.length)await sWrite(`${sh}!A1`,vals);}
async function initSheets(){try{const c=await sGet('Tasks!A1:A1');if(!c.values)await sWrite('Tasks!A1',[TCOLS]);}catch{await sWrite('Tasks!A1',[TCOLS]);}}

// ── Data ──────────────────────────────────────────────────────
function r2t(row){const t={};TCOLS.forEach((c,i)=>t[c]=row[i]||'');t.isBig=bool(t.isBig);t.isUrgent=bool(t.isUrgent);t.done=bool(t.done);t.priority=Number(t.priority)||5;t.value=t.value?Number(t.value):'';try{t.assignees=t.assignees?JSON.parse(t.assignees):[]}catch{t.assignees=[];}return t;}
function t2r(t){return TCOLS.map(c=>{const v=t[c];if(c==='assignees')return JSON.stringify(v||[]);if(['isBig','isUrgent','done'].includes(c))return v?'TRUE':'FALSE';return v??'';});}
async function loadWsData(){
  await initSheets();
  const[tr,cr]=await Promise.all([sGet('Tasks!A1:N9999'),sGet('Config!A1:B10')]);
  S.tasks=(tr.values||[]).slice(1).filter(r=>r[0]).map(r2t);

  // Load saved groups and people from Config sheet
  (cr.values||[]).forEach(row=>{try{if(row[0]==='groups')S.groups=JSON.parse(row[1])||S.groups;if(row[0]==='people')S.people=JSON.parse(row[1])||S.people;}catch{}});

  // Also scan all existing tasks and merge any groups/people not yet in the lists
  S.tasks.forEach(t=>{
    if(t.group&&!S.groups.includes(t.group))S.groups.push(t.group);
    (t.assignees||[]).forEach(p=>{if(p&&!S.people.includes(p))S.people.push(p);});
  });

  // If lists changed, save back to Config sheet
  await syncCfg();
}
async function syncTasks(){showSync('Syncing…');try{await clearWrite('Tasks',[TCOLS,...S.tasks.map(t2r)]);}finally{setTimeout(()=>showSync(null),700);}}
async function syncCfg(){showSync('Saving…');try{await clearWrite('Config',[['groups',JSON.stringify(S.groups)],['people',JSON.stringify(S.people)]]);}finally{setTimeout(()=>showSync(null),600);}}

// ── Task ops ──────────────────────────────────────────────────
async function createTask(form){const t={...form,id:uid(),done:false,createdAt:new Date().toISOString(),finishedAt:''};S.tasks.unshift(t);renderApp();if(t.group&&!S.groups.includes(t.group)){S.groups.push(t.group);syncCfg();}(t.assignees||[]).forEach(p=>{if(!S.people.includes(p)){S.people.push(p);syncCfg();}});await syncTasks();}
async function updateTask(id,form){S.tasks=S.tasks.map(t=>t.id===id?{...t,...form}:t);renderApp();if(form.group&&!S.groups.includes(form.group)){S.groups.push(form.group);syncCfg();}(form.assignees||[]).forEach(p=>{if(!S.people.includes(p)){S.people.push(p);syncCfg();}});await syncTasks();}
async function toggleTask(id){S.tasks=S.tasks.map(t=>t.id!==id?t:{...t,done:!t.done,finishedAt:!t.done?new Date().toISOString():''});renderApp();await syncTasks();}
async function deleteTask(id){if(!confirm('Delete this task?'))return;S.tasks=S.tasks.filter(t=>t.id!==id);renderApp();await syncTasks();}

// ── Add to Google Calendar ────────────────────────────────────────────────
async function addToCalendar(id){
  const t=S.tasks.find(t=>t.id===id);
  if(!t||!t.deadline){toast('No deadline set for this task.');return;}
  showSync('Adding to Calendar...');
  try{
    await ensureToken();
    const start=new Date(t.deadline);
    const end=new Date(start.getTime()+60*60*1000); // 1 hour duration
    const event={
      summary:`[TM] ${t.title}`,
      description:[
        t.description?`${t.description}\n`:'',
        `Quadrant: ${QD[getQ(t)].e} ${QD[getQ(t)].l}`,
        `Priority: P${t.priority}`,
        t.value?`Value: ${fmtM(t.value)}`:'',
        t.group?`Group: ${t.group}`:'',
        t.assignees?.length?`Assigned to: ${t.assignees.join(', ')}`:'',
        `\nCreated by TaskMaster`,
      ].filter(Boolean).join('\n'),
      start:{dateTime:start.toISOString(),timeZone:Intl.DateTimeFormat().resolvedOptions().timeZone},
      end:{dateTime:end.toISOString(),timeZone:Intl.DateTimeFormat().resolvedOptions().timeZone},
      reminders:{useDefault:false,overrides:[{method:'popup',minutes:60},{method:'popup',minutes:1440}]},
    };
    const r=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events',{
      method:'POST',
      headers:{Authorization:`Bearer ${S.token}`,'Content-Type':'application/json'},
      body:JSON.stringify(event)
    });
    const data=await r.json();
    if(!r.ok)throw new Error(data.error?.message||'Calendar error');
    toast('✓ Added to Google Calendar!');
  }catch(e){alert('Calendar error: '+e.message);}
  finally{showSync(null);}
}

// ── CSV Export ────────────────────────────────────────────────
function exportCSV(filter='all'){const tasks=filter==='done'?S.tasks.filter(t=>t.done):filter==='active'?S.tasks.filter(t=>!t.done):S.tasks;if(!tasks.length){alert('No tasks to export.');return;}const hdrs=['Title','Status','Quadrant','Priority','Value(THB)','Group','Assignees','Deadline','Created','Completed','Duration(days)'];const rows=tasks.map(t=>{const dur=t.createdAt&&t.finishedAt?Math.ceil((new Date(t.finishedAt)-new Date(t.createdAt))/86400000):'';return[`"${t.title}"`,t.done?'Done':'Active',getQ(t),t.priority,t.value||'',t.group||'',(t.assignees||[]).join(';'),t.deadline||'',t.createdAt,t.finishedAt||'',dur].join(',');});const blob=new Blob([[hdrs.join(','),...rows].join('\n')],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`tasks_${filter}_${new Date().toISOString().slice(0,10)}.csv`;a.click();}
// -- Copy for AI
function copyForAI(){
  const payload=JSON.stringify({workspace:S.ws?.name||'',exportedAt:new Date().toISOString(),tasks:S.tasks,groups:S.groups,people:S.people});
  navigator.clipboard.writeText(payload).then(()=>toast('✓ Copied! Paste into the Claude artifact.'));
}
// ── Time stats ────────────────────────────────────────────────
function timeBounds(){const n=new Date(),ds=new Date(n.getFullYear(),n.getMonth(),n.getDate()),ws=new Date(ds);ws.setDate(ds.getDate()-((n.getDay()+6)%7));return{ds,ws,ms:new Date(n.getFullYear(),n.getMonth(),1),ys:new Date(n.getFullYear(),0,1)};}
function cntIn(tasks,field,b){const ts=t=>t[field]?new Date(t[field]):null;return{day:tasks.filter(t=>{const d=ts(t);return d&&d>=b.ds}).length,week:tasks.filter(t=>{const d=ts(t);return d&&d>=b.ws}).length,month:tasks.filter(t=>{const d=ts(t);return d&&d>=b.ms}).length,year:tasks.filter(t=>{const d=ts(t);return d&&d>=b.ys}).length};}

function getDisp(){
  let l=S.tasks.filter(t=>S.tab==='done'?t.done:!t.done);
  if(S.fq!=='all')l=l.filter(t=>getQ(t)===S.fq);
  l=[...l].sort((a,b)=>{if(S.sort==='deadline'){if(!a.deadline&&!b.deadline)return 0;if(!a.deadline)return 1;if(!b.deadline)return-1;return new Date(a.deadline)-new Date(b.deadline);}if(S.sort==='priority')return b.priority-a.priority;if(S.sort==='value')return(Number(b.value)||0)-(Number(a.value)||0);return new Date(b.createdAt)-new Date(a.createdAt);});
  return l;
}
function getGrouped(d){
  if(S.grp==='none')return[{k:'all',label:null,c:null,items:d}];
  if(S.grp==='quadrant')return Object.entries(QD).map(([k,v])=>({k,label:`${v.e} ${v.l}`,c:v.c,items:d.filter(t=>getQ(t)===k)})).filter(g=>g.items.length);
  if(S.grp==='group'){const gs=[...new Set(d.map(t=>t.group||'(No Group)'))];return gs.map(g=>({k:g,label:`🏷 ${g}`,c:null,items:d.filter(t=>(t.group||'(No Group)')===g)}));}
  if(S.grp==='assignee'){const ps=[...new Set(d.flatMap(t=>t.assignees?.length?t.assignees:['(Unassigned)']))];return ps.map(p=>({k:p,label:`👤 ${p}`,c:null,items:d.filter(t=>p==='(Unassigned)'?!t.assignees?.length:t.assignees?.includes(p))}));}
  return[{k:'all',label:null,c:null,items:d}];
}

    ${pr.map(p=>`<div class="ar2"><div class="art"><span style="font-size:13px;color:#d1d5db">${p.i} ${p.l}</span><span style="font-size:17px;font-weight:700;color:var(--g);font-family:var(--fd)">${comp[p.k]}</span></div><div class="pb"><div class="pf" style="width:${comp.year?comp[p.k]/comp.year*100:0}%;background:linear-gradient(90deg,#10b981,#34d399)"></div></div></div>`).join('')}</div>
    <div class="ct"><div class="cth"><span>Period</span><span style="text-align:center;color:var(--al)">Added</span><span style="text-align:center;color:var(--g)">Done</span></div>${pr.map(p=>`<div class="ctr"><span style="color:#d1d5db">${p.i} ${p.l}</span><span style="text-align:center;font-weight:700;color:var(--al)">${add[p.k]}</span><span style="text-align:center;font-weight:700;color:var(--g)">${comp[p.k]}</span></div>`).join('')}</div>`;
  if(S.atab==='quadrant')body=`<div>${byQ.map(({q,v,t,d})=>`<div style="background:${v.bg};border:1px solid ${v.c}30;border-radius:16px;padding:13px;margin-bottom:9px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px"><span style="font-size:13px;font-weight:600;color:${v.c}">${v.e} ${v.l}</span><div><span style="font-size:17px;font-weight:700;color:#fff;font-family:var(--fd)">${d}</span><span style="font-size:12px;color:var(--m)">/${t}</span></div></div><div class="pb"><div class="pf" style="width:${t?d/t*100:0}%;background:${v.c}"></div></div><div style="font-size:11px;color:var(--m);margin-top:5px">${t?Math.round(d/t*100):0}% complete${t-d>0?` · ${t-d} remaining`:''}</div></div>`).join('')}</div>`;
  document.getElementById('modal-area').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="sheet"><div class="hdl"></div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:13px"><h2 class="dp" style="font-size:20px">Analytics</h2><button class="btn bg" onclick="closeModal()">${I.close}</button></div><div class="at">${['overview','activity','quadrant'].map(t=>`<button class="atb ${S.atab===t?'on':''}" onclick="switchAtab('${t}')">${t==='overview'?'Overview':t==='activity'?'Activity':'Quadrant'}</button>`).join('')}</div><div style="overflow-y:auto;max-height:calc(85vh - 130px)">${body}<div style="display:flex;gap:7px;margin-top:13px">
  <button class="btn bp" style="flex:1;font-size:13px" onclick="exportCSV('all')">${I.exp} All Tasks</button>
  <button class="btn" style="width:100%;background:rgba(99,102,241,0.15);color:#818cf8;border:1px solid rgba(99,102,241,0.3);border-radius:12px;font-size:13px;font-weight:600;padding:11px;margin-top:13px;margin-bottom:7px" onclick="copyForAI()">📋 Copy Tasks for Claude Artifact</button>
  <button class="btn" style="flex:1;background:var(--gb);color:#6ee7b7;border:1px solid rgba(52,211,153,0.3);border-radius:12px;font-size:13px;font-weight:600;padding:14px" onclick="exportCSV('active')">${I.exp} Active</button>
  <button class="btn" style="flex:1;background:var(--ab);color:var(--al);border:1px solid rgba(99,102,241,0.3);border-radius:12px;font-size:13px;font-weight:600;padding:14px" onclick="exportCSV('done')">${I.exp} Done</button>
</div></div></div></div>`;
}

// ── Settings ──────────────────────────────────────────────────
function openSettings(){S.modal='settings';renderSettings();}
function renderSettings(){
  document.getElementById('modal-area').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="sheet"><div class="hdl"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:17px"><h2 class="dp" style="font-size:20px">Settings</h2><button class="btn bg" onclick="closeModal()">${I.close}</button></div>
    ${S.user?`<div style="display:flex;align-items:center;gap:11px;padding:13px;background:rgba(255,255,255,0.05);border-radius:16px;margin-bottom:17px">${S.user.picture?`<img class="av" src="${esc(S.user.picture)}" referrerpolicy="no-referrer" style="width:42px;height:42px">`:`<div class="avf" style="width:42px;height:42px">${(S.user.name||'U')[0]}</div>`}<div style="flex:1;min-width:0"><div style="font-weight:600;font-size:14px">${esc(S.user.name||'')}</div><div style="font-size:12px;color:var(--m)">${esc(S.user.email||'')}</div></div><button class="btn bg" onclick="signOut()" title="Sign out">${I.logout}</button></div>`:''}
    <div style="background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.2);border-radius:16px;padding:13px;margin-bottom:17px">
      <div style="font-size:11px;font-weight:700;color:var(--al);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px">Current Workspace</div>
      <div style="font-size:14px;font-weight:700;margin-bottom:4px">${esc(S.ws?.name||'')}</div>
      <div style="font-size:12px;color:var(--m);margin-bottom:11px">${S.ws?.isOwner?'You are the owner':'Shared with you by '+esc(S.ws?.owner||'')}</div>
      <div style="display:flex;gap:7px">
        <button class="btn" style="flex:1;background:rgba(255,255,255,0.06);color:var(--m);padding:9px;font-size:12px" onclick="closeModal();showWorkspaces()">Switch Workspace</button>
        ${S.ws?.isOwner?`<button class="btn" style="flex:1;background:var(--gb);color:#6ee7b7;padding:9px;font-size:12px;border:1px solid rgba(52,211,153,0.3)" onclick="closeModal();openShareModal('${esc(S.ws?.id||'')}','${esc(S.ws?.name||'')}')">${I.share} Share</button>`:''}
        <button class="btn bg" style="padding:9px" onclick="window.open('https://docs.google.com/spreadsheets/d/${esc(S.ws?.id||'')}','_blank')" title="Open in Sheets">${I.ext}</button>
      </div>
    </div>
    <div style="margin-bottom:17px"><div style="font-size:11px;color:var(--d);text-transform:uppercase;letter-spacing:.06em;margin-bottom:9px">Groups</div>
      <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:7px" id="sg">${S.groups.map(g=>`<span class="chip ca">${esc(g)} <span onclick="rmG('${esc(g)}')" style="margin-left:3px;cursor:pointer;opacity:.6;font-size:13px">×</span></span>`).join('')}</div>
      <div class="ar"><input id="sng" placeholder="Add group…" style="font-size:13px"><button class="ab" style="background:var(--ab);color:var(--al)" onclick="addGS()">Add</button></div>
    </div>
    <div style="margin-bottom:17px"><div style="font-size:11px;color:var(--d);text-transform:uppercase;letter-spacing:.06em;margin-bottom:9px">People</div>
      <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:7px" id="sp">${S.people.map(p=>`<span class="chip cg">${esc(p)} <span onclick="rmP('${esc(p)}')" style="margin-left:3px;cursor:pointer;opacity:.6;font-size:13px">×</span></span>`).join('')}</div>
      <div class="ar"><input id="snp" placeholder="Add person…" style="font-size:13px"><button class="ab" style="background:var(--gb);color:#6ee7b7" onclick="addPS()">Add</button></div>
    </div>
  </div></div>`;
}
async function rmG(g){S.groups=S.groups.filter(x=>x!==g);document.getElementById('sg').innerHTML=S.groups.map(g=>`<span class="chip ca">${esc(g)} <span onclick="rmG('${esc(g)}')" style="margin-left:3px;cursor:pointer;opacity:.6;font-size:13px">×</span></span>`).join('');await syncCfg();}
async function addGS(){const i=document.getElementById('sng'),g=i.value.trim();if(!g)return;if(!S.groups.includes(g))S.groups.push(g);i.value='';renderSettings();await syncCfg();}
async function rmP(p){S.people=S.people.filter(x=>x!==p);document.getElementById('sp').innerHTML=S.people.map(p=>`<span class="chip cg">${esc(p)} <span onclick="rmP('${esc(p)}')" style="margin-left:3px;cursor:pointer;opacity:.6;font-size:13px">×</span></span>`).join('');await syncCfg();}
async function addPS(){const i=document.getElementById('snp'),p=i.value.trim();if(!p)return;if(!S.people.includes(p))S.people.push(p);i.value='';renderSettings();await syncCfg();}

// Controls
function setTab(v){S.tab=v;S.expanded.clear();renderApp();}
function setFq(v){S.fq=v;renderApp();}
function setSort(v){S.sort=v;renderApp();}
function setGrp(v){S.grp=v;renderApp();}
function toggleExp(id){if(S.expanded.has(id))S.expanded.delete(id);else S.expanded.add(id);const el=document.querySelector(`#tc-${id} .tx`);if(el)el.classList.toggle('on',S.expanded.has(id));}

// Init
window.addEventListener('load',()=>{showLogin();const w=setInterval(()=>{if(window.google?.accounts?.oauth2){clearInterval(w);initAuth();}},100);});
</script>
</body>
</html>
